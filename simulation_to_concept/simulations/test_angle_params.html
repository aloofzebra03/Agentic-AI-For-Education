<!DOCTYPE html>
<html>
<head>
    <title>Test Angle Parameters</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        iframe { border: 2px solid #9b59b6; border-radius: 8px; margin: 10px 0; }
        .test-case { margin: 20px 0; padding: 15px; background: #f5f5f5; border-radius: 8px; }
        h3 { color: #9b59b6; }
    </style>
</head>
<body>
    <h1>🔺 Angle Parameter Testing</h1>
    <p>Testing the angle-sum-property.html simulation with different angle inputs</p>

    <div class="test-case">
        <h3>Test 1: Equilateral Triangle (60°, 60°, 60°)</h3>
        <iframe src="angle-sum-property.html?angleA=60&angleB=60&angleC=60" width="420" height="600"></iframe>
    </div>

    <div class="test-case">
        <h3>Test 2: Right Triangle (90°, 45°, 45°)</h3>
        <iframe src="angle-sum-property.html?angleA=90&angleB=45&angleC=45" width="420" height="600"></iframe>
    </div>

    <div class="test-case">
        <h3>Test 3: Obtuse Triangle (120°, 30°, 30°)</h3>
        <iframe src="angle-sum-property.html?angleA=120&angleB=30&angleC=30" width="420" height="600"></iframe>
    </div>

    <div class="test-case">
        <h3>Test 4: Acute Triangle (70°, 60°, 50°)</h3>
        <iframe src="angle-sum-property.html?angleA=70&angleB=60&angleC=50" width="420" height="600"></iframe>
    </div>
</body>
</html>
